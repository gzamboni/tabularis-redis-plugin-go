name: CI

on:
  push:
    branches: [ "**" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.19'

    - name: Build
      run: go build -v ./...

    - name: Run Unit Tests
      run: go test -v ./...

    - name: Setup Redis (main branch only)
      if: github.ref == 'refs/heads/main'
      uses: shogo82148/actions-setup-redis@v1
      with:
        redis-version: '7.x'

    - name: Run E2E Tests (main branch only)
      if: github.ref == 'refs/heads/main'
      run: |
        chmod +x tests/test_pubsub_comprehensive.sh
        ./tests/test_pubsub_comprehensive.sh
      env:
        REDIS_HOST: localhost
        REDIS_PORT: 6379
